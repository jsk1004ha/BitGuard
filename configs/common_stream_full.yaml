experiment:
  name: common_stream_full
  output_dir: runs
  seed: 2309

dataset:
  type: csv
  path: data/common_stream_features.csv
  label_column: behavior_label
  raw_attack_column: raw_attack
  device_column: device_id
  time_column: timestamp
  chunk_size: 200000
  max_rows_per_file: null
  max_rows_per_class: null

split:
  strategy: time
  train_fraction: 0.70
  validation_fraction: 0.15
  test_fraction: 0.15
  seed: 2309

preprocess:
  feature_budget: 24
  selection: expert
  expert_features:
    - packet_rate
    - byte_rate
    - burst_score
    - tcp_ratio
    - udp_ratio
    - icmp_ratio
    - syn_ratio
    - rst_ratio
    - ack_only_ratio
    - unique_destination_ip_ratio
    - unique_destination_port_ratio
    - new_destination_ratio
    - repeated_destination_score
    - repeated_port_score
    - interarrival_mean
    - interarrival_jitter
    - interarrival_stability
    - periodicity_score
    - outbound_packet_ratio
    - outbound_byte_ratio
    - short_flow_ratio
    - long_flow_ratio
    - small_packet_ratio
    - failed_connection_score
  scaler: robust
  encoder: thermometer
  thermometer_bits: 2
  open_set:
    enabled: true
    confidence_threshold: 0.60
    benign_distance_quantile: 0.99

model:
  type: cost_aware_bnn
  hidden_dims: [64, 32]
  dropout: 0.05
  binary_first_layer: true
  gate_temperature: 1.0

loss:
  type: focal
  focal_gamma: 2.0
  class_weighted: true
  lambda_feature: 0.01
  beta_fn: 0.25
  gamma_fp: 0.05
  distillation_alpha: 0.0

training:
  epochs: 40
  batch_size: 2048
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 8
  num_workers: 4
  device: auto
  amp: false
  selection_weights: {macro_f1: 0.5, macro_auprc: 0.3, attack_recall: 0.2}

cascade:
  enabled: true
  boolean_fast_path_enabled: true
  tiny_feature_budget: 8
  hidden_dims: [16]
  min_attack_recall: 0.995
  threshold_grid_size: 201
  temporal_penalty: 0.30
  use_temporal_state: true
  false_negative_cost: 0.10
  device_criticality_default: 0.0
  device_criticality: {}

temporal:
  enabled: true
  increment: 2
  decay: 1
  evidence_threshold: 0.45
  max_devices: 4096
  decay_interval_seconds: 60
  risk_weights: {model: 0.55, scan: 0.13, flood: 0.13, beacon: 0.10, unknown: 0.14, benign: 0.08}
  action_thresholds: [0.18, 0.30, 0.44, 0.60, 0.78]

evaluation:
  high_risk_labels: [scan_like, flood_like, exfil_like, unknown_like]
  save_predictions: true
  make_plots: true
  benchmark_warmup: 50
  benchmark_repeats: 500

