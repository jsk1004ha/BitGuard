experiment:
  name: demo_logreg
  output_dir: runs
  seed: 2309

dataset:
  type: csv
  path: data/demo.csv
  label_column: behavior_label
  raw_attack_column: raw_attack
  device_column: device_id
  time_column: timestamp
  chunk_size: 100000

split:
  strategy: attack
  train_fraction: 0.70
  validation_fraction: 0.15
  test_fraction: 0.15
  held_out_attacks: [novel_lowrate]
  seed: 2309

preprocess:
  feature_budget: 24
  selection: cost_aware
  scaler: robust
  encoder: none
  thermometer_bits: 2
  open_set:
    enabled: true
    confidence_threshold: 0.62
    benign_distance_quantile: 0.985

model:
  type: logistic_regression

loss:
  type: weighted_ce

training:
  epochs: 1
  batch_size: 512
  learning_rate: 0.001
  weight_decay: 0.0
  patience: 1
  num_workers: 0
  device: cpu
  amp: false

cascade:
  enabled: false

temporal:
  enabled: true
  increment: 2
  decay: 1
  evidence_threshold: 0.45
  risk_weights:
    model: 0.55
    scan: 0.13
    flood: 0.13
    beacon: 0.10
    unknown: 0.14
    benign: 0.08
  action_thresholds: [0.18, 0.30, 0.44, 0.60, 0.78]

evaluation:
  high_risk_labels: [scan_like, flood_like, exfil_like, unknown_like]
  save_predictions: true
  make_plots: true
  benchmark_warmup: 1
  benchmark_repeats: 1

