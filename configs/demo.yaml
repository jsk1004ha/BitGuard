experiment:
  name: demo
  output_dir: runs
  seed: 2309

dataset:
  type: csv
  path: data/demo.csv
  label_column: behavior_label
  raw_attack_column: raw_attack
  device_column: device_id
  time_column: timestamp
  chunk_size: 100000
  max_rows_per_file: null
  max_rows_per_class: null

split:
  strategy: attack
  train_fraction: 0.70
  validation_fraction: 0.15
  test_fraction: 0.15
  held_out_attacks: [novel_lowrate]
  seed: 2309

preprocess:
  feature_budget: 24
  selection: cost_aware
  scaler: robust
  encoder: thermometer
  thermometer_bits: 2
  feature_cost_csv: null
  open_set:
    enabled: true
    confidence_threshold: 0.62
    benign_distance_quantile: 0.985

model:
  type: cost_aware_bnn
  hidden_dims: [64, 32]
  dropout: 0.05
  binary_first_layer: true
  gate_temperature: 1.0

loss:
  type: focal
  focal_gamma: 2.0
  class_weighted: true
  lambda_feature: 0.01
  beta_fn: 0.20
  gamma_fp: 0.05
  distillation_alpha: 0.0
  distillation_temperature: 2.0

training:
  epochs: 8
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 3
  num_workers: 0
  device: auto
  amp: false

cascade:
  enabled: true
  tiny_feature_budget: 8
  hidden_dims: [16]
  min_attack_recall: 0.97
  threshold_grid_size: 101
  temporal_penalty: 0.30
  false_negative_cost: 0.08
  device_criticality_default: 0.0

temporal:
  enabled: true
  increment: 2
  decay: 1
  evidence_threshold: 0.45
  risk_weights:
    model: 0.55
    scan: 0.13
    flood: 0.13
    beacon: 0.10
    unknown: 0.14
    benign: 0.08
  action_thresholds: [0.18, 0.30, 0.44, 0.60, 0.78]

evaluation:
  high_risk_labels: [scan_like, flood_like, exfil_like, unknown_like]
  save_predictions: true
  make_plots: true
  benchmark_warmup: 20
  benchmark_repeats: 100

